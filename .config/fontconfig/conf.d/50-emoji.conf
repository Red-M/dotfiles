<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>CozetteVector NFM</family>
      <family>CozetteVector NF</family>
      <family>Noto Color Emoji</family>
      <family>Noto Emoji</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test qual="any" name="family" compare="contains"><string>Monaco</string></test>
    <edit name="family" mode="assign"><string>monospace</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family" compare="contains"><string>Consolas</string></test>
    <edit name="family" mode="assign"><string>monospace</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family" compare="contains"><string>Courier</string></test>
    <edit name="family" mode="assign"><string>monospace</string></edit>
  </match>

</fontconfig>
